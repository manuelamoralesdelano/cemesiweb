<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-height: 100vh;
    color: #000;
    overflow-y: hidden;
  }
  
  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 15px 40px 20px 40px;
    height: 90px;
  }
  
  

  .logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  
  .logo-img {
    height: 31.5px;
    width: auto;
    object-fit: contain;
    margin-bottom: 0px;
  }

  /* Navigation */
  nav.main-nav {
    flex-grow: 1;
    display: flex;
    justify-content: space-evenly;
    align-items: flex-end;
    position: relative;
    top: 0;
  }
  nav.main-nav a {
    text-decoration: none;
    color: #6a6a6a;
    font-size: 16px;
    padding-bottom: 0;
    transition: text-shadow 0.3s ease;
  }

  nav.main-nav a:hover, nav.main-nav a.active-link {
    text-shadow: 0.5px 0 0 currentcolor, -0.5px 0 0 currentcolor;
  }
  
  .lang-switch {
    font-size: 15px;
    font-weight: normal; 
    padding-bottom: 0;
    align-self: flex-end;
    color: #6a6a6a;
    position: relative;
    top: 0;
  }
  .lang-switch span {
    cursor: pointer;
    transition: color 0.2s;
  }
  .lang-switch span:hover {
    color: #555;
  }
  .lang-switch span.active-lang {
    font-weight: normal; 
    text-decoration: underline;
  }
  
  /* Main Content */
  .hero {
    flex-grow: 1;
    background-image: url('https://i.imgur.com/utSPpvj.jpg');
    background-size: cover;
    background-position: center;
    overflow: hidden;
    position: relative;
    display: flex;
  }
  
  .nosotros-overlay {
    flex-grow: 1;
    overflow-y: auto;
    width: 100%;
    background-color: rgba(255, 255, 255, 0.85); 
    display: flex;
    justify-content: center; 
    align-items: stretch; 
    padding: min(5vh, 40px) 40px 10px 40px;
    gap: 60px; 
  }
  
  /* Left Sidebar Links */
  .nosotros-sidebar {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 250px;
    flex-shrink: 0;
  }
  .nosotros-sidebar a {
    text-decoration: none;
    color: #000;
    font-size: 16px;
    transition: text-shadow 0.3s ease;
  }
  .nosotros-sidebar a:hover, 
  .nosotros-sidebar a.selected-tab {
    text-shadow: 0.5px 0 0 currentcolor, -0.5px 0 0 currentcolor;
  }

  .nosotros-content {
    display: flex;
    visibility: hidden;
    opacity: 0;
    pointer-events: none;
    flex-direction: column;
    width: 500px;
    height: 64vh; 
    align-items: flex-start;
    transition: opacity 0.4s ease;
  }
  .nosotros-content.active {
    visibility: visible;
    opacity: 1;
    pointer-events: auto;
  }
  
  .nosotros-content div {
    font-size: clamp(11px, 1.5vh, 15px); 
    line-height: 1.4;
  }
  
  .nosotros-content b {
    font-size: clamp(12px, 1.6vh, 17px); 
    display: inline-block;
    margin-top: 10px;
  }
  
  .direccion-text { font-size: clamp(15px, 1.9vh, 21px) !important; line-height: 1.4 !important; }
  .direccion-text b { font-size: clamp(17px, 2.1vh, 24px) !important; }
  
  .equipo-text { font-size: clamp(16px, 1.95vh, 19.5px) !important; line-height: 1.45 !important; }
  .equipo-text b { font-size: clamp(18px, 2.1vh, 22.1px) !important; }
  
  .compromiso-text { font-size: clamp(13px, 1.5vh, 15.5px) !important; line-height: 1.4 !important; }
  .compromiso-text b { font-size: clamp(15px, 1.7vh, 17.5px) !important; }
  
  .tecnologia-text { font-size: clamp(12px, 1.6vh, 15.7px) !important; line-height: 1.4 !important; }
  .tecnologia-text b { font-size: clamp(13px, 1.7vh, 17.8px) !important; display: inline-block; }
  
  .nosotros-content img {
    border-radius: 4px;
    width: 100% !important;
  }

  
  .convenios-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
  }
  .convenio-link {
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.2s ease, filter 0.2s ease;
    width: 120px;
  }
  .convenio-link:hover {
    transform: scale(1.08);
  }
  .convenio-logo {
    max-width: 100%;
    height: auto;
    max-height: 60px;
    object-fit: contain;
  }

  /* Footer */
  footer {
    display: flex;
    align-items: flex-start;
    padding: 20px 40px;
    background-color: #fff;
    font-size: 14px;
    line-height: 1.4;
  }
  
  .footer-qr {
    width: 70px;
    height: 70px;
    margin-right: 25px;
    flex-shrink: 0;
  }
  
  .footer-col {
    margin-right: 60px;
  }

  .contact-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
    color: #6a6a6a;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .contact-item a {
    color: #6a6a6a;
    text-decoration: none;
    transition: text-decoration 0.2s;
  }
  .contact-item a:hover {
    text-decoration: underline;
  }

  .address-col a {
    text-decoration: none;
    color: #6a6a6a;
    cursor: pointer;
    transition: color 0.2s;
  }
  .address-col a:hover {
    color: #555;
    text-decoration: underline;
  }

  /* Map Modal */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.6);
    display: none; 
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .modal-overlay.active {
    display: flex;
    opacity: 1;
  }
  .modal-content {
    background: #fff;
    padding: 5px;
    border-radius: 4px;
    width: 80%;
    max-width: 800px;
    height: 70%;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .modal-close {
    position: absolute;
    top: -40px;
    right: 0;
    color: #fff;
    font-size: 30px;
    cursor: pointer;
    font-weight: bold;
    text-decoration: none;
    line-height: 1;
  }
  .modal-close:hover {
    color: #ddd;
  }
  .modal-content iframe {
    flex-grow: 1;
    border: none;
    width: 100%;
    height: 100%;
  }

  /* Interactive Portrait Section */
  .nosotros-right {
    width: 380px;
    height: 100%;
    flex-shrink: 0;
    position: relative;
    display: block;
  }

  .portrait-img {
    width: 220px;
    height: 330px;
    border-radius: 4px;
    object-fit: cover;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .portrait-brief {
    color: #000;
    font-size: 11px;
    line-height: 1.4;
  }

  .portrait-full-text {
    color: #000;
    font-size: 13.5px;
    line-height: 1.5;
    text-align: justify;
    padding-right: 15px;
  }

  @media (min-width: 901px) {
    .nosotros-right {
      cursor: pointer;
    }
    
    .portrait-img {
      position: absolute;
      left: 0;
      top: 20px;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s ease;
      z-index: 10;
    }
    
    .portrait-brief {
      position: absolute;
      left: 235px;
      top: 20px;
      width: 145px;
      height: 330px;
      overflow: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      opacity: 1;
      visibility: visible;
      z-index: 5;
      pointer-events: none;
      -webkit-mask-image: linear-gradient(to bottom, black 65%, transparent 95%);
      mask-image: linear-gradient(to bottom, black 65%, transparent 95%);
    }
    
    .portrait-full-text {
      position: absolute;
      left: -230px;
      top: 20px;
      width: 580px;
      height: calc(100% - 40px);
      overflow-y: auto;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 6;
    }

    .nosotros-right.expanded .portrait-img,
    .nosotros-right:hover .portrait-img {
      transform: translateX(-480px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .nosotros-right.expanded .portrait-brief,
    .nosotros-right:hover .portrait-brief {
      opacity: 0 !important;
      visibility: hidden !important;
      display: none !important;
    }

    .nosotros-right.expanded .portrait-full-text,
    .nosotros-right:hover .portrait-full-text {
      opacity: 1;
      visibility: visible;
    }

    .nosotros-overlay.portrait-active .nosotros-content {
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
  }
  /* --- RESPONSIVE MOBILE & TABLET --- */
  @media (max-width: 1200px) {
    body { overflow-y: auto !important; }
    
    header { flex-direction: column; height: auto; padding: 20px; gap: 20px; align-items: center; }
    
    nav.main-nav {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      top: 0;
      flex-wrap: wrap;
      gap: 15px 25px;
    }
    .lang-switch { align-self: center; top: 0; margin-top: 5px; }
    
    footer { flex-direction: column; align-items: center; text-align: center; gap: 30px; padding: 30px 20px; }
    .footer-qr { margin-right: 0; }
    .footer-col { margin-right: 0; }
    .contact-item { justify-content: center; }

    .modal-content { width: 95%; height: 60%; }
    
    .nosotros-overlay { flex-direction: column !important; align-items: center !important; padding: 40px 20px !important; height: auto !important; }
    .nosotros-sidebar { width: 100% !important; border-right: none !important; border-bottom: 1px solid #ccc; padding-right: 0 !important; padding-bottom: 20px !important; margin-bottom: 20px; text-align: center; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
    .nosotros-sidebar .tab-link { display: inline-block; margin-bottom: 5px; }
    .nosotros-content { width: 100% !important; height: auto !important; align-items: center !important; }
    
    .nosotros-content > div { flex-direction: column !important; height: auto !important; gap: 30px !important; margin: 0 !important; }
    .nosotros-content > div > div { min-width: 100% !important; width: 100% !important; }
    .nosotros-content img { max-height: 40vh !important; object-fit: contain !important; }
    .direccion-text { text-align: center !important; }

    .nosotros-right {
      width: 100% !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 40px;
      border-top: 1px solid #ccc;
      padding-top: 40px;
    }
    .portrait-img {
      width: 100% !important;
      max-width: 280px;
      height: auto !important;
    }
    .portrait-brief {
      display: none; /* Hide brief on mobile, show full bio */
    }
    .portrait-full-text {
      opacity: 1 !important;
      visibility: visible !important;
      width: 100% !important;
      position: relative !important;
      left: 0 !important;
      top: 0 !important;
      height: auto !important;
      overflow-y: visible !important;
    }
  }
</style>

  <script>
    const generalTranslations = {
      es: {
        servicios: "Servicios",
        nosotros: "Nosotros",
        convenios: "Convenios",
        horarios: "Horarios",
        dias: "Lunes a Viernes",
        tab_porque_elegirnos: "Porque Elegirnos",
        tab_principios_valores: "Principios y Valores",
        tab_equipo: "Equipo",
        tab_convenios: "Clientes y convenios",
        noticias: "Noticias",
        linkedin_text: "en linkedin",
        bernardo_brief_text: `<div style="font-weight: bold; font-size: 13px; line-height: 1.35; margin-bottom: 8px; color: #000;">Fundador y Director<br>Dr. Bernardo Morales Catalán</div><div style="font-style: italic; font-size: 11px; line-height: 1.35; margin-bottom: 10px; color: #555;">Estimados colegas, pacientes, gestores de salud y amigos:</div><p style="font-size: 11px; line-height: 1.45; text-align: justify; color: #222;">Quiero compartir con ustedes parte de mi trayectoria profesional y el compromiso que ha guiado mi labor médica durante todos estos años. Soy médico cirujano titulado en la Universidad de Concepción en 1987 y especialista en Anatomía Patológica por la Pontificia Universidad Católica de Chile desde 1991. A lo largo de mi carrera me he desempeñado como médico patólogo en distintas instituciones...</p>`,
        bernardo_full_text: `<p style="margin-bottom: 12px; font-weight: bold; font-size: 15px;">Fundador y Director Dr. Bernardo Morales Catalán</p><p style="margin-bottom: 10px; font-style: italic;">Estimados colegas, pacientes, gestores de salud y amigos:</p><p style="margin-bottom: 10px;">Quiero compartir con ustedes parte de mi trayectoria profesional y el compromiso que ha guiado mi labor médica durante todos estos años.</p><p style="margin-bottom: 10px;">Soy médico cirujano titulado en la Universidad de Concepción en 1987 y especialista en Anatomía Patológica por la Pontificia Universidad Católica de Chile desde 1991. A lo largo de mi carrera me he desempeñado como médico patólogo en distintas instituciones públicas y privadas, adquiriendo una amplia experiencia diagnóstica y una sólida capacidad resolutiva en diversos niveles de complejidad.</p><p style="margin-bottom: 10px;">También he tenido la oportunidad de ejercer funciones directivas en servicios de Anatomía Patológica, direcciones hospitalarias y corporaciones de salud, experiencias que han fortalecido mi visión integral del sistema sanitario y de la gestión en salud.</p><p style="margin-bottom: 10px;">En el ámbito académico, he desarrollado una constante labor docente como profesor de Anatomía Patológica y Medicina Legal en universidades e instituciones públicas, llegando en dos oportunidades a desempeñarme como Decano de Facultades de Salud.</p><p style="margin-bottom: 10px;">Asimismo, en el área médico-legal, fui Jefe del Departamento de Tanatología del Servicio Médico Legal durante un extenso período, labor que me permitió incorporar una perspectiva pericial y forense al ejercicio de la medicina.</p><p style="margin-bottom: 10px;">Como fundador, mantengo el compromiso de aportar una mirada profesional, humana y rigurosa, orientada siempre al servicio de las personas y al fortalecimiento de la salud.</p>`
      },
      en: {
        servicios: "Services",
        nosotros: "About Us",
        convenios: "Agreements",
        horarios: "Business Hours",
        dias: "Monday to Friday",
        tab_porque_elegirnos: "Why Choose Us",
        tab_principios_valores: "Principles and Values",
        tab_equipo: "Team",

    const contentBox = document.getElementById('nosotrosContent');

    function setLang(lang) {
      currentLang = lang;
      
      if (lang === 'es') {
        btnEs.classList.add('active-lang');
        btnEn.classList.remove('active-lang');
      } else {
        btnEn.classList.add('active-lang');
        btnEs.classList.remove('active-lang');
      }

      // general DOM texts
      document.querySelectorAll('[data-translate]').forEach(el => {
        const key = el.getAttribute('data-translate');
        if (generalTranslations[lang] && generalTranslations[lang][key]) {
          el.innerHTML = generalTranslations[lang][key];
        }
      });

      // Update active tab content
      if (currentTabId && nosotrosData[currentTabId]) {
        contentBox.innerHTML = nosotrosData[currentTabId][lang];
        document.title = generalTranslations[lang]["tab_" + currentTabId] + " - CEMESI";
      }
    }

    function loadTab(id) {
      // Reset Bernardo portrait expansion when changing tabs
      const bernardoColumn = document.getElementById('bernardoColumn');
      const nosotrosOverlay = document.querySelector('.nosotros-overlay');
      if (bernardoColumn && nosotrosOverlay) {
        bernardoColumn.classList.remove('expanded');
        nosotrosOverlay.classList.remove('portrait-active');
      }

      const data = nosotrosData[id];
      if (!data) return;

      currentTabId = id;

      document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('selected-tab'));
      const activeLink = document.querySelector(`[data-id="${id}"]`);
      if(activeLink) activeLink.classList.add('selected-tab');

      contentBox.innerHTML = data[currentLang];
      contentBox.classList.add('active');

      const url = new URL(window.location);
      url.searchParams.set('seccion', id);
      window.history.pushState({}, '', url);

      document.title = generalTranslations[currentLang]["tab_" + id] + " - CEMESI";
    }

    document.addEventListener('DOMContentLoaded', () => {
      btnEs.addEventListener('click', () => setLang('es'));
      btnEn.addEventListener('click', () => setLang('en'));

      document.querySelectorAll('.tab-link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          loadTab(link.getAttribute('data-id'));
        });
      });

      const urlParams = new URLSearchParams(window.location.search);
      let initTab = urlParams.get('seccion');
      if (!initTab || !nosotrosData[initTab]) {
        initTab = 'porque_elegirnos';
      }
      loadTab(initTab);

      // Map Modal mirror logic
      const addressLink = document.getElementById('address-link');
      const mapModal = document.getElementById('mapModal');
      const closeMap = document.getElementById('closeMap');

      if (addressLink) {
        addressLink.addEventListener('click', (e) => {
          e.preventDefault();
          mapModal.classList.add('active');
        });
      }

      if (closeMap) {
        closeMap.addEventListener('click', () => {
          mapModal.classList.remove('active');
        });
      }

      if (mapModal) {
        mapModal.addEventListener('click', (e) => {
          if (e.target === mapModal) {
            mapModal.classList.remove('active');
          }
        });
      }
      
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && mapModal && mapModal.classList.contains('active')) {
          mapModal.classList.remove('active');
        }
      });

      // Bernardo column interactivity
      const bernardoColumn = document.getElementById('bernardoColumn');
      const nosotrosOverlay = document.querySelector('.nosotros-overlay');
      
      if (bernardoColumn && nosotrosOverlay) {
        // Toggle on click, ignoring clicks inside full text to allow scrolling/reading
        bernardoColumn.addEventListener('click', (e) => {
          if (e.target.closest('.portrait-full-text')) {
            return;
          }
          const isExpanded = bernardoColumn.classList.contains('expanded');
          if (isExpanded) {
            bernardoColumn.classList.remove('expanded');
            nosotrosOverlay.classList.remove('portrait-active');
          } else {
            bernardoColumn.classList.add('expanded');
            nosotrosOverlay.classList.add('portrait-active');
          }
        });

        // Hover handlers (as fallback to keep UX snappy)
        bernardoColumn.addEventListener('mouseenter', () => {
          if (!bernardoColumn.classList.contains('expanded')) {
            nosotrosOverlay.classList.add('portrait-active');
          }
        });

        bernardoColumn.addEventListener('mouseleave', () => {
          if (!bernardoColumn.classList.contains('expanded')) {
            nosotrosOverlay.classList.remove('portrait-active');
          }
        });

        // Close when clicking outside of the biography column
        document.addEventListener('click', (e) => {
          if (bernardoColumn.classList.contains('expanded') && !bernardoColumn.contains(e.target)) {
            bernardoColumn.classList.remove('expanded');
            nosotrosOverlay.classList.remove('portrait-active');
          }
        });
      }

      // Initialize language
      setLang('es');
    });

    window.addEventListener('popstate', () => {
      const urlParams = new URLSearchParams(window.location.search);
      let id = urlParams.get('seccion');
      if (!id || !nosotrosData[id]) {
