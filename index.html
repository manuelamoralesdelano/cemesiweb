<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Centro Médico CEMESI. 35 años de excelencia, precisión y confianza en diagnóstico. Servicios clínicos, laboratorio y convenios. Ubicados en Providencia, Región Metropolitana, Chile.">
<meta name="keywords" content="CEMESI, centro médico, laboratorio clínico, diagnóstico, salud, convenios, Providencia, Chile">
<title>CEMESI - Excelencia, Precisión y Confianza en Diagnóstico</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/EDcBZn6.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    color: #000;
  }
  
  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    height: 90px;
  }
  
  
  .logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  
  .logo-img {
    height: 70px;
    width: auto;
    object-fit: contain;
    margin-bottom: 0px;
    position: relative;
    top: 5px; 
  }
  /* Navigation */
  nav.main-nav {
    flex-grow: 1;
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    position: relative;
    top: -5px;
  }
  nav.main-nav a {
    text-decoration: none;
    color: #6a6a6a;
    font-size: 16px;
    padding-bottom: 2px;
    transition: text-shadow 0.3s ease;
  }
  /* Smooth transition to bold hover effect using text-shadow */
  nav.main-nav a:hover {
    text-shadow: 0.5px 0 0 currentcolor, -0.5px 0 0 currentcolor;
  }
  
  .lang-switch {
    font-size: 15px;
    font-weight: normal; 
    padding-bottom: 5px;
    align-self: flex-end;
    color: #6a6a6a;
    position: relative;
    top: -5px;
  }
  .lang-switch span {
    cursor: pointer;
    transition: color 0.2s;
  }
  .lang-switch span:hover {
    color: #555;
  }
  .lang-switch span.active-lang {
    font-weight: normal; 
    text-decoration: underline;
  }
  
  /* Main Content */
  .hero {
    flex-grow: 1;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  
  
  /* Slider */
  .slider {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
    overflow: hidden;
  }
  .slide {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }
  .slide.active {
    opacity: 1;
    z-index: 2;
  }
  .slide-content {
    background-color: rgba(255, 255, 255, 0.82);
    padding: 25px 60px;
    padding: 15px 40px;
    text-align: center;
    display: inline-block;
    opacity: 0;
  }
  .slide.active .slide-content {
    animation: fadeInContent 1s ease-in-out 1s forwards;
  }
  .slide.active .slide-logo {
    animation: fadeInContent 1s ease-in-out 1s forwards;
  }
  @keyframes fadeInContent {
    to { opacity: 1; }
  }
  .slide-link {
    font-weight: 400;
    font-size: 33px; 
    font-size: 55px; 
    color: #6a6a6a;
    margin: 0;
    letter-spacing: -0.5px;
    <main class="hero">
    <div class="slider">
      <div class="slide active" style="background-image: url('https://i.imgur.com/utSPpvj.jpg');">
        <div class="slide-content">
          <img src="https://i.imgur.com/SpJaJBO.png" alt="CEMESI" style="height: 100px;">
        </div>
        <img src="https://i.imgur.com/7C1C5rk.png" alt="CEMESI" class="slide-logo" style="height: 120px; opacity: 0;">
      </div>
      <div class="slide" style="background-image: url('https://i.imgur.com/2lU10Ig.jpg');">
        <div class="slide-content">
    function resetInterval() {
      clearInterval(slideInterval);
      slideInterval = setInterval(nextSlide, 4000);
      slideInterval = setInterval(nextSlide, 12000);
    }
    document.addEventListener('DOMContentLoaded', () => {
      slideInterval = setInterval(nextSlide, 4000);
      slideInterval = setInterval(nextSlide, 12000);
    });
    // Modal Logic
    document.addEventListener('DOMContentLoaded', () => {
      btnEs.addEventListener('click', () => setLang('es'));
      btnEn.addEventListener('click', () => setLang('en'));
      const addressLink = document.getElementById('address-link');
      const mapModal = document.getElementById('mapModal');
      const closeMap = document.getElementById('closeMap');
      addressLink.addEventListener('click', (e) => {
        e.preventDefault();
        mapModal.classList.add('active');
      });
      closeMap.addEventListener('click', () => {
        mapModal.classList.remove('active');
      });
      mapModal.addEventListener('click', (e) => {
        if (e.target === mapModal) {
          mapModal.classList.remove('active');
        }
      });
      
      // Allow escape key to close map
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && mapModal.classList.contains('active')) {
          mapModal.classList.remove('active');
        }
      });
    });
  </script>
</body>
</html>
